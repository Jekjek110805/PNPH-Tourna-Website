<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Our Team</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="PN EGAMES (1).png" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link>
    <style>
      body {
        font-family: 'Oxanium', cursive;
        background-color: #111827;
        color: #f9fafb;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-image: url("PNPH BACKGROUND (2).png");
        background-repeat: no-repeat;
        background-size: cover;
      }

      .container {
        max-width: 800px;
        width: 100%;
        background-color: rgba(240, 240, 240, 0.1);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(240, 240, 240, 0.1);
        margin-bottom: 30px;
        position: relative;
      }

      h1 {
        text-align: center;
        color: #e0f2fe;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 2.5rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      form {
        margin-top: 20px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #ffffff;
        font-weight: 500;
        font-size: 1.1rem;
      }

      input[type="text"],
      input[type="email"],
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(240, 240, 240, 0.2);
        border-radius: 6px;
        background-color: rgba(0, 0, 0, 0.05);
        color:rgb(255, 255, 255);
        font-family: 'Oxanium', cursive;
        font-size: 1rem;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        backdrop-filter: blur(5px);
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #a855f7;
        box-shadow: 0 0 5px rgba(167, 139, 250, 0.3);
      }

      textarea {
        resize: none;
        height: 120px;
      }

      select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvgxmlns='http://www.w3.org/2000/svg'viewBox='0 0 24 24'%3E%3Cpathfill='%23fff'd='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-color: #111827;
        background-size: 20px;
        padding-right: 30px;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #a855f7;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
        font-family: 'Oxanium', cursive;
      }

      button:hover {
        background-color: #7e22ce;
        transform: translateY(-2px);
      }

      button:active {
        background-color: #5b21b6;
        transform: translateY(0);
      }

      .error-message {
        color: #f87171;
        font-size: 0.9rem;
        margin-top: 8px;
        display: none;
      }

      .error input,
      .error select,
      .error textarea {
        border-color: #f87171;
      }

      .error input:focus,
      .error select:focus,
      .error textarea:focus {
        box-shadow: 0 0 5px rgba(248, 113, 113, 0.3);
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(10px);
      }

      .modal-content {
        background-color: #1d4ed8;
        color: #f9fafb;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 500px;
        text-align: center;
        animation: fadeIn 0.3s;
        border: 1px solid rgba(240, 240, 240, 0.1);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-50px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-content h2 {
        font-size: 2rem;
        margin-bottom: 20px;
        color: #e0f2fe;
      }

      .modal-content p {
        font-size: 1.2rem;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .modal-content button {
        padding: 12px 25px;
        background-color: #a855f7;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
        font-family: 'Oxanium', cursive;
        margin: 0 10px;
      }

      .modal-content button:hover {
        background-color: #7e22ce;
        transform: translateY(-2px);
      }

      .modal-content button:active {
        background-color: #5b21b6;
        transform: translateY(0);
      }

      #okBtn {
        background-color: #a855f7;
      }

      #okBtn:hover {
        background-color: #7e22ce;
      }

      .logo {
        top: 20px;
        height: 150px;
        margin-left:320px;
        margin-top: 30px;
        width: auto;
      }

      .back-button {
        top: 20px;
        border: none;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.3s ease;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(240, 240, 240, 0.1);
      }

      .back-button:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }

      .back-button:active {
        background-color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="PN EGAMES (1).png"
        alt="Logo"
        class="logo"
      />
      <button class="back-button">Back</button>
      <h1>Join Our Team</h1>
      <form id="joinTeamForm">
        <div class="form-group">
          <label for="fullName">Full Name:</label>
          <input type="text" id="fullName" name="fullName" required />
          <div id="fullNameError" class="error-message">
            Please enter your full name.
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
          <div id="emailError" class="error-message">
            Please enter a valid email address.
          </div>
        </div>

        <div class="form-group">
          <label for="role">Role:</label>
          <select id="role" name="role" required>
            <option value="">Select a Role</option>
            <option value="TeamCaptain">Team Captain</option>
            <option value="Player">Player</option>
            <option value="Coach">Coach</option>
            <option value="Analyst">Analyst</option>
            <option value="Other">Other</option>
          </select>
          <div id="roleError" class="error-message">Please choose a role.</div>
        </div>

        <div class="form-group">
          <label for="experience">Experience:</label>
          <textarea id="experience" name="experience" required></textarea>
          <div id="experienceError" class="error-message">
            Please enter your experience.
          </div>
        </div>

        <button type="submit">Send Application</button>
      </form>
    </div>

    <div id="customModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">Success!</h2>
        <p id="modalText">Your application has been sent successfully!</p>
        <button id="okBtn">OK</button>
      </div>
    </div>

    <script>
      const joinTeamForm = document.getElementById("joinTeamForm");
      const modal = document.getElementById("customModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalText = document.getElementById("modalText");
      const okBtn = document.getElementById("okBtn");
      const backButton = document.querySelector(".back-button");

      joinTeamForm.addEventListener("submit", (event) => {
        event.preventDefault();

        let isValid = true;

        isValid = validateField("fullName", isValid);
        isValid = validateField("email", isValid);
        isValid = validateField("role", isValid);
        isValid = validateField("experience", isValid);

        if (isValid) {
          const fullName = document.getElementById("fullName").value;
          const email = document.getElementById("email").value;
          const role = document.getElementById("role").value;
          const experience = document.getElementById("experience").value;

          joinTeamForm.reset();

          modalTitle.textContent = "Success!";
          modalText.textContent = "Your application has been sent successfully!";
          modal.style.display = "flex";
        }
      });

      function validateField(fieldName, currentValidity) {
        const inputField = document.getElementById(fieldName);
        const errorField = document.getElementById(fieldName + "Error");

        if (!inputField.value.trim()) {
          errorField.style.display = "block";
          inputField.parentElement.classList.add("error");
          return false;
        } else {
          errorField.style.display = "none";
          inputField.parentElement.classList.remove("error");
          return currentValidity;
        }
      }

      document.getElementById("email").addEventListener("input", () => {
        const emailInput = document.getElementById("email");
        const emailValue = emailInput.value.trim();
        const errorField = document.getElementById("emailError");
        const emailRegex = /^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/;

        if (!emailRegex.test(emailValue)) {
          errorField.textContent = "Please enter a valid email address.";
          errorField.style.display = "block";
          emailInput.parentElement.classList.add("error");
        } else {
          errorField.style.display = "none";
          emailInput.parentElement.classList.remove("error");
        }
      });

      okBtn.addEventListener("click", () => {
        modal.style.display = "none";
      });

      backButton.addEventListener("click", () => {
        window.history.back();
      });
    </script>
  </body>
</html>
